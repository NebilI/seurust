name: Publish RSeurat R package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-r:
    name: Build tarball and sync r-universe
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
          extra-repositories: 'https://satijalab.r-universe.dev'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libclang-dev \
            llvm-dev \
            patchelf

      - name: Install R build dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: RSeurat
          dependencies: '"hard"'

      - name: Configure RSeurat
        working-directory: RSeurat
        run: Rscript tools/config.R
        env:
          NOT_CRAN: true

      - name: Build source tarball
        run: R CMD build RSeurat

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: RSeurat_*.tar.gz

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: RSeurat-source
          path: RSeurat_*.tar.gz

      - name: Sync r-universe registry
        if: github.event_name == 'release'
        env:
          UNIVERSE_TOKEN: ${{ secrets.R_UNIVERSE_REGISTRY_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ -z "$UNIVERSE_TOKEN" ]; then
            echo "::warning::R_UNIVERSE_REGISTRY_TOKEN not configured; skipping r-universe sync"
            exit 0
          fi
          git clone "https://x-access-token:${UNIVERSE_TOKEN}@github.com/NebilI/NebilI.r-universe.dev.git" universe-registry
          cd universe-registry
          cat > packages.json <<EOF
          [
            {
              "package": "RSeurat",
              "url": "https://github.com/NebilI/Rust-Seurat",
              "subdir": "RSeurat",
              "branch": "${RELEASE_TAG}"
            }
          ]
          EOF
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add packages.json
          git diff --cached --quiet || git commit -m "Point RSeurat at release ${RELEASE_TAG}"
          git push
