name: Publish rseurat crate

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RSeurat/src/rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libclang-dev \
            llvm-dev \
            r-base \
            r-base-dev

      - name: Install RcppEigen
        run: Rscript -e 'install.packages("RcppEigen", repos = "https://cloud.r-project.org")'

      - name: Verify crate packages cleanly
        env:
          R_HOME: /usr/lib/R
        run: cargo publish --dry-run

      - name: Publish to crates.io
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          R_HOME: /usr/lib/R
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::warning::CRATES_IO_TOKEN not configured; skipping crates.io publish"
            exit 0
          fi
          cargo publish --token "$CARGO_REGISTRY_TOKEN"
