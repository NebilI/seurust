# Local development containers for seurust.
# Usage (from repo root):
#   docker compose -f docker/docker-compose.yml build
#   docker compose -f docker/docker-compose.yml run --rm rcpp-dev
#   docker compose -f docker/docker-compose.yml run --rm rust-dev

services:
  rcpp-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rcpp
    image: seurust-rcpp:dev
    volumes:
      - ..:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true

  rust-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rust
      args:
        RCPP_IMAGE: seurust-rcpp:dev
    image: seurust-rust:dev
    environment:
      NOT_CRAN: "1"
      SEURAT_KEEP_RUST_TARGET: "1"
    volumes:
      - ..:/workspace
      - seurust-cargo:/usr/local/cargo/registry
      - seurust-target:/workspace/seurust/src/rust/target
    working_dir: /workspace
    stdin_open: true
    tty: true

volumes:
  seurust-cargo:
  seurust-target:
